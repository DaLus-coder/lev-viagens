<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- ================= CONFIGURAÇÕES BÁSICAS ================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS principal da página -->
    <link rel="stylesheet" href="alugueis.css">

    <link rel="icon" href="../img/logo_lev_new.png" type="image/png">

    <title>Lev Viagem</title>
</head>

<body>

    <!-- =========================================================
         HEADER MOBILE (LOGO + MENU)
    ========================================================= -->
    <header class="mobile-header">

        <!-- LOGO CENTRAL (ILHA AMARELA) -->
        <div class="logo-island">
            <img src="../img/logo_lev_new.png" alt="LEV Viagem">
        </div>

        <!-- BOTÃO MENU MOBILE -->
        <button id="menuBtn" class="menu-btn">☰</button>

        <!-- MENU LATERAL MOBILE -->
        <nav id="mobileMenu" class="mobile-menu">
            <div id="userArea"></div>
            <a href="../index.html">Todos serviços</a>
            <a href="#">Alugueis</a>
            <a href="maintenance/oooppsss.html">Experiências da serra</a>
            <a href="maintenance/oooppsss.html">Gastronomia</a>
        </nav>

    </header>

    <!-- =========================================================
         HERO (SEÇÃO PRINCIPAL)
    ========================================================= -->
    <section class="hero">
        <div class="hero-content">
        </div>
    </section>

    <!-- =========================================================
         CONTEÚDO PRINCIPAL
    ========================================================= -->
    <section class="content">


        <!-- =====================================================
             SEÇÃO DE TABS (CATEGORIAS)
        ===================================================== -->
        <section class="tabs-section">

            <!-- BOTÕES DAS TABS -->
            <div class="tabs-header">

                <button class="tab-btn active" data-tab="alugueis">Aluguéis</button>
                <button class="tab-btn" data-tab="experiencias">Experiências</button>
                <button class="tab-btn" data-tab="gastronomia">Gastronomia</button>

            </div>

            <!-- =================================================
                 TAB: ALUGUEIS
            ================================================= -->
            <div class="tab-content active" id="alugueis">
                <div class="mini-carousel">
                    <button class="mini-arrow prev">&#10094;</button>

                    <div class="mini-window">
                        <div class="mini-track" id="alugueis-track"></div>
                    </div>

                    <button class="mini-arrow next">&#10095;</button>
                </div>
            </div>

            <!-- =================================================
                 TAB: EXPERIENCIAS
            ================================================= -->
            <div class="tab-content" id="experiencias">
                <div class="mini-carousel">
                    <button class="mini-arrow prev">&#10094;</button>

                    <div class="mini-window">
                        <div class="mini-track" id="experiencias-track"></div>
                    </div>

                    <button class="mini-arrow next">&#10095;</button>
                </div>
            </div>

            <!-- =================================================
                 TAB: GASTRONOMIA
            ================================================= -->
            <div class="tab-content" id="gastronomia">
                <div class="mini-carousel">
                    <button class="mini-arrow prev">&#10094;</button>

                    <div class="mini-window">
                        <div class="mini-track" id="gastronomia-track"></div>
                    </div>

                    <button class="mini-arrow next">&#10095;</button>
                </div>
            </div>

        </section>

        <!-- =====================================================
             BENEFÍCIOS
        ===================================================== -->
        <div class="benefits">

            <div class="benefit">
                <h3>Segurança Total</h3>
                <p>Equipamentos revisados e seguros para você.</p>
            </div>

            <div class="benefit">
                <h3>Melhores Avaliações</h3>
                <p>Clientes satisfeitos e aventuras inesquecíveis.</p>
            </div>

            <div class="benefit">
                <h3>Suporte 24h</h3>
                <p>Atendimento sempre disponível.</p>
            </div>

            <div class="benefit">
                <h3>Melhores Preços</h3>
                <p>Condições especiais para você.</p>
            </div>

        </div>

    </section>

    <!-- SCRIPT PRINCIPAL -->
     <script src="../auth.js"></script>
    <script src="alugueis.js"></script>

</body>

</html>
