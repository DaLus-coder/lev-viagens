<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- ================= META CONFIG ================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='white' stroke='black' stroke-width='1.5' d='M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.3l.9-4.6c.1-.4 0-.8-.3-1.1L14 1 7.6 7.4C7.2 7.8 7 8.3 7 8.9V19c0 1.1.9 2 2 2h9c.8 0 1.5-.5 1.8-1.2l3-7c.1-.2.2-.5.2-.8v-1z'/%3E%3C/svg%3E">

    <title>CMS ViagensLev</title>

    <!-- ================= ESTILOS GERAIS ================= -->
    <style>

        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f4f4f4;
            overflow-x: hidden;
        }

        /* =====================================================
           SIDEBAR (MENU LATERAL)
        ===================================================== */

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #012f87;
            color: white;
            padding: 20px;
            transition: .3s;
            z-index: 1000;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .nav-item {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            background: transparent;
            color: white;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: .2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background: #efb400;
            color: black;
        }

        /* =====================================================
           CONTEÚDO PRINCIPAL
        ===================================================== */

        .cms-content {
            margin-left: 260px;
            padding: 20px;
            transition: .3s;
        }

        /* =====================================================
           INPUTS E SELECTS
        ===================================================== */

        input,
        select {
            width: 320px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: .2s;
            background: white;
        }

        input:focus,
        select:focus {
            border-color: #012f87;
            box-shadow: 0 0 0 2px rgba(1, 47, 135, 0.2);
        }

        /* =====================================================
           BOTÕES PADRÃO
        ===================================================== */

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: .2s;
        }

        /* botão salvar */
        .save-btn {
            background: #efb400;
            color: black;
            margin-top: 10px;
        }

        .save-btn:hover {
            opacity: .85;
        }

        /* botão upload */
        .upload-btn {
            background: #012f87;
            color: white;
            margin: 5px 0 10px;
        }

        .upload-btn:hover {
            opacity: .85;
        }

        /* =====================================================
           LISTAGEM DE CARDS
        ===================================================== */

        #cards h2 {
            margin-top: 30px;
            color: #012f87;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .card-admin {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
            padding-bottom: 10px;
        }

        .card-admin img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .card-admin h4 {
            padding: 10px;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            padding: 0 10px 10px;
        }

        /* botões do card */
        .edit-btn {
            background: #012f87;
            color: white;
            flex: 1;
            margin-right: 5px;
        }

        .delete-btn {
            background: #ff3b3b;
            color: white;
            flex: 1;
        }

        /* =====================================================
           MENU MOBILE
        ===================================================== */

        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            background: #012f87;
            color: white;
            padding: 10px;
            border-radius: 8px;
            z-index: 2000;
        }

        /* overlay escuro */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 900;
        }

        .overlay.active {
            display: block;
        }

        /* =====================================================
           RESPONSIVIDADE
        ===================================================== */

        @media(max-width:768px) {

            .sidebar {
                left: auto;
                right: 0;
                transform: translateX(100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .cms-content {
                margin-left: 0;
                width: 100%;
            }

            input,
            select {
                width: 100%;
            }

            .menu-toggle {
                display: block;
            }
        }

    </style>
</head>

<body>

    <!-- =====================================================
         OVERLAY (FECHAR MENU MOBILE)
    ===================================================== -->
    <div class="overlay" id="overlay"></div>

    <!-- botão do menu mobile -->
    <button class="menu-toggle" id="menuToggle">☰</button>

    <!-- =====================================================
         SIDEBAR
    ===================================================== -->
    <aside class="sidebar" id="sidebar">

        <h2>CMS ViagensLev</h2>

        <button class="nav-item active">Cards</button>
        <button class="nav-item">Clientes</button>
        <button class="nav-item">Reservas</button>

    </aside>

    <!-- =====================================================
         CONTEÚDO PRINCIPAL
    ===================================================== -->
    <div class="cms-content">

        <h1>Gerenciar Cards</h1>

        <!-- FORMULÁRIO DE CADASTRO -->
        <input id="titulo" placeholder="Título">
        <input id="descricao" placeholder="Descrição">

        <!-- UPLOAD DE IMAGEM -->
        <input type="file" id="file">
        <button type="button" onclick="uploadImagem()" class="upload-btn">
            Upload imagem
        </button>

        <!-- URL DA IMAGEM -->
        <input id="imagem">

        <!-- CATEGORIA -->
        <select id="categoria">
            <option value="alugueis">Alugueis</option>
            <option value="experiencias">Experiencias</option>
            <option value="gastronomia">Gastronomia</option>
        </select>

        <!-- TEXTO DO BOTÃO -->
        <input id="botao_texto" placeholder="Texto botão">

        <!-- SALVAR -->
        <button class="save-btn" onclick="saveCard()">Salvar card</button>

        <hr>

        <!-- LISTA DE CARDS -->
        <div id="cards"></div>

    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script src="admin.js"></script>

</body>

</html>
