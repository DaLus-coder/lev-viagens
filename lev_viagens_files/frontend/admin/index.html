<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS ViagensLev</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f4f4f4;
            overflow-x: hidden;
        }

        /* ================= SIDEBAR ================= */

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #012f87;
            color: white;
            padding: 20px;
            transition: .3s;
            z-index: 1000;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .nav-item {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            background: transparent;
            color: white;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: .2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background: #efb400;
            color: black;
        }

        /* ================= CONTENT ================= */

        .cms-content {
            margin-left: 260px;
            padding: 20px;
            transition: .3s;
        }

        /* ================= INPUTS (AGORA BONITOS) ================= */

        input,
        select {
            width: 320px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: .2s;
            background: white;
        }

        input:focus,
        select:focus {
            border-color: #012f87;
            box-shadow: 0 0 0 2px rgba(1, 47, 135, 0.2);
        }

        /* ================= BOTÕES GERAIS ================= */

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: .2s;
        }

        /* botão salvar */
        .save-btn {
            background: #efb400;
            color: black;
            margin-top: 10px;
        }

        .save-btn:hover {
            opacity: .85;
        }

        /* ================= CARDS ================= */

        #cards h2 {
            margin-top: 30px;
            color: #012f87;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .card-admin {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
            padding-bottom: 10px;
        }

        .card-admin img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .card-admin h4 {
            padding: 10px;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            padding: 0 10px 10px;
        }

        /* botões dos cards (AGORA BONITOS) */

        .edit-btn {
            background: #012f87;
            color: white;
            flex: 1;
            margin-right: 5px;
        }

        .delete-btn {
            background: #ff3b3b;
            color: white;
            flex: 1;
        }

        /* ================= MOBILE MENU ================= */

        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            background: #012f87;
            color: white;
            padding: 10px;
            border-radius: 8px;
            z-index: 2000;
        }

        /* overlay (AGORA FUNCIONA) */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 900;
        }

        .overlay.active {
            display: block;
        }

        /* ================= MOBILE ================= */

        @media(max-width:768px) {

            .sidebar {
                left: auto;
                right: 0;
                transform: translateX(100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .cms-content {
                margin-left: 0;
                width: 100%;
            }

            input,
            select {
                width: 100%;
            }

            .menu-toggle {
                display: block;
            }
        }

        .upload-btn {
            background: #012f87;
            color: white;
            margin: 5px 0 10px;
        }

        .upload-btn:hover {
            opacity: .85;
        }
    </style>
</head>

<body>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay"></div>

    <!-- MENU BTN -->
    <button class="menu-toggle" id="menuToggle">☰</button>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

        <h2>CMS ViagensLev</h2>

        <button class="nav-item active">Cards</button>
        <button class="nav-item">Clientes</button>
        <button class="nav-item">Reservas</button>

    </aside>

    <!-- CONTENT -->
    <div class="cms-content">

        <h1>Gerenciar Cards</h1>

        <input id="titulo" placeholder="Título">
        <input id="descricao" placeholder="Descrição">
        <input type="file" id="file">
        <button type="button" onclick="uploadImagem()" class="upload-btn">
            Upload imagem
        </button>
        <input id="imagem">
        <select id="categoria">
            <option value="alugueis">Alugueis</option>
            <option value="experiencias">Experiencias</option>
            <option value="gastronomia">Gastronomia</option>
        </select>

        <input id="botao_texto" placeholder="Texto botão">

        <button class="save-btn" onclick="saveCard()">Salvar card</button>

        <hr>

        <div id="cards"></div>

    </div>

    <script src="admin.js"></script>

</body>

</html>
